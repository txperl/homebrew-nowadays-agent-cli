name: Sync claude-code casks

on:
  schedule:
    - cron: "17,37,57 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-claude-code
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SYNC_COMMIT_SUBJECT_FILE: /tmp/sync-commit-subject
    steps:
      - uses: actions/checkout@v4

      - name: Sync casks
        run: python3 scripts/sync_claude_code.py

      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            if [[ -s "$SYNC_COMMIT_SUBJECT_FILE" ]]; then
              subject="$(cat "$SYNC_COMMIT_SUBJECT_FILE")"
            else
              subject="chore(cask): sync claude-code casks"
            fi
            git commit -m "$subject"
            git push
          else
            echo "no changes"
          fi
